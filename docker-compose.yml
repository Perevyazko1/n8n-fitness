services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    # Только loopback. Наружу торчит существующий host-network nginx,
    # который проксирует https://n8n-fitness.ru -> 127.0.0.1:5678
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=${DOMAIN}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${DOMAIN}/
      - N8N_EDITOR_BASE_URL=https://${DOMAIN}/
      - N8N_PROXY_HOPS=1
      - GENERIC_TIMEZONE=${TZ:-Europe/Moscow}
      - TZ=${TZ:-Europe/Moscow}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_RUNNERS_ENABLED=true
      # Снято с true: Code-нодам нужен доступ к TELEGRAM_BOT_TOKEN
      # для HMAC-валидации initData мини-аппа (см. Fitness_Bot_Barcode.json).
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_DIAGNOSTICS_ENABLED=false
      # Токен Telegram-бота — нужен Code-ноде в Fitness_Bot_Barcode для проверки
      # подписи initData от Telegram Web App. Значение в .env.
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # Разрешаем built-in модуль crypto в Code-нодах (HMAC-валидация initData).
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  n8n_data:
