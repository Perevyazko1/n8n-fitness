# vhost для n8n-fitness.ru
#
# Куда положить:
#   на сервере существующий nginx-контейнер монтирует один файл —
#   /root/vacuum_remote/nginx/nginx.conf. Поэтому ЭТИ server-блоки нужно
#   ВСТАВИТЬ ВНУТРЬ блока http { ... } существующего nginx.conf, рядом с
#   уже работающими server-блоками для dev-rs-auto.store.
#
# После правки nginx.conf:
#   docker exec nginx nginx -t          # проверка синтаксиса
#   docker exec nginx nginx -s reload   # горячий релоад
#
# Сертификат выпускается отдельно через certbot --standalone
# (см. README.md шаг "TLS"). На время выпуска nginx-контейнер
# останавливается, /var/www/certbot НЕ используется.

# --- HTTP: редирект на HTTPS ---
server {
    listen 80;
    server_name n8n-fitness.ru www.n8n-fitness.ru;

    return 301 https://n8n-fitness.ru$request_uri;
}

# --- HTTPS: реверс-прокси на n8n ---
server {
    listen 443 ssl;
    http2 on;
    server_name n8n-fitness.ru;

    ssl_certificate     /etc/letsencrypt/live/n8n-fitness.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n-fitness.ru/privkey.pem;

    # n8n умеет загружать большие воркфлоу/файлы
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:5678;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE для живых логов и обновлений редактора n8n
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}

# --- редирект www -> apex ---
server {
    listen 443 ssl;
    http2 on;
    server_name www.n8n-fitness.ru;

    ssl_certificate     /etc/letsencrypt/live/n8n-fitness.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n-fitness.ru/privkey.pem;

    return 301 https://n8n-fitness.ru$request_uri;
}
